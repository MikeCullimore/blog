project:
  type: website
  output-dir: _site

website:
  title: "Mike's blog"
  navbar:
    left:
      - href: index.qmd
        text: Posts
      - about.qmd

format:
  html:
    theme:
      dark: darkly
      light: cosmo        # clean default; alternatives: flatly, litera, solar
    respect-user-color-scheme: true
    highlight-style: github
    code-fold: true       # code blocks collapsed by default — reader can expand
    toc: true
    toc-depth: 3
    number-sections: false
    fig-responsive: true

execute:
  freeze: auto            # only re-execute cells when source changes